apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solidarytech
data:
  solidarytech-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "title": "CPU Usage por Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=~\"solidarytech-.*\"}[5m])) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Memória Usage por Namespace",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=~\"solidarytech-.*\"}) by (namespace)",
              "legendFormat": "{{namespace}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 15, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Taxa de Requisições HTTP (por serviço)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_namespace=\"solidarytech\"}[5m])) by (service_name)",
              "legendFormat": "{{service_name}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Taxa de Erros HTTP 5xx (por serviço)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_request_duration_seconds_count{service_namespace=\"solidarytech\", http_response_status_code=~\"5..\"}[5m])) by (service_name) / sum(rate(http_server_request_duration_seconds_count{service_namespace=\"solidarytech\"}[5m])) by (service_name) * 100",
              "legendFormat": "{{service_name}} - 5xx %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "title": "Pods Running / Not Ready",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{namespace=~\"solidarytech-.*\", phase=\"Running\"})",
              "legendFormat": "Running"
            }
          ],
          "fieldConfig": {
            "defaults": { "thresholds": { "steps": [{ "color": "green", "value": null }] } }
          }
        },
        {
          "title": "Pods com Restart",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(kube_pod_container_status_restarts_total{namespace=~\"solidarytech-.*\"}[1h]))",
              "legendFormat": "Restarts (1h)"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 3 },
                  { "color": "red", "value": 10 }
                ]
              }
            }
          }
        },
        {
          "title": "Latência P95 (por serviço)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_server_request_duration_seconds_bucket{service_namespace=\"solidarytech\"}[5m])) by (le, service_name))",
              "legendFormat": "{{service_name}} P95"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10, "lineWidth": 2 }
            }
          }
        },
        {
          "title": "Logs em Tempo Real (Loki)",
          "type": "logs",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 28 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=~\"solidarytech-.*\"}",
              "legendFormat": ""
            }
          ],
          "options": {
            "showTime": true,
            "showLabels": true,
            "showCommonLabels": false,
            "wrapLogMessage": true,
            "prettifyLogMessage": false,
            "enableLogDetails": true,
            "sortOrder": "Descending",
            "dedupStrategy": "none"
          }
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["solidarytech", "observability"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "SolidaryTech - Visão Geral",
      "uid": "solidarytech-overview",
      "version": 1
    }
