# =============================================================================
# Self-Healing + AIOps Webhook Receiver
# Roda dentro do cluster, recebe webhooks do Alertmanager, executa a
# remediação (rollout restart) e gera uma análise de causa raiz do incidente
# com GenAI (Claude API) — tudo postado em um único embed no Discord.
# =============================================================================
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: self-healing-script
  namespace: monitoring
  labels:
    app.kubernetes.io/name: self-healing
    app.kubernetes.io/part-of: solidarytech
data:
  server.py: |
    #!/usr/bin/env python3
    """
    Self-Healing + AIOps Webhook Server
    Recebe alertas do Alertmanager, executa a remediação (rollout restart) e
    gera uma análise de causa raiz do incidente com GenAI (Claude API),
    postando tudo em um único embed no Discord.
    """
    import json
    import subprocess
    import os
    import logging
    import urllib.request
    from http.server import HTTPServer, BaseHTTPRequestHandler
    from datetime import datetime

    logging.basicConfig(
        level=logging.INFO,
        format='%(asctime)s [%(levelname)s] %(message)s'
    )
    log = logging.getLogger("self-healing")

    # Mapeamento de service_name para namespace
    SERVICE_NAMESPACE_MAP = {
        "donation-service": "solidarytech-donation",
        "ngo-service": "solidarytech-ngo",
        "volunteer-service": "solidarytech-volunteer",
    }

    # --- Configuração (via env / Secret) ----------------------------------------
    DISCORD_WEBHOOK_URL = os.getenv("DISCORD_WEBHOOK_URL", "")

    # AIOps — resumo de incidente com GenAI (Claude API). Tudo best-effort:
    # se a chave não existir ou a chamada falhar, o self-healing continua normal.
    ANTHROPIC_API_KEY = os.getenv("ANTHROPIC_API_KEY", "")
    ANTHROPIC_MODEL = os.getenv("ANTHROPIC_MODEL", "claude-haiku-4-5-20251001")
    ANTHROPIC_BASE_URL = os.getenv("ANTHROPIC_BASE_URL", "https://api.anthropic.com")
    AISUMMARY_MAX_TOKENS = int(os.getenv("AISUMMARY_MAX_TOKENS", "300"))


    def generate_incident_summary(ctx):
        """Gera uma análise de causa raiz do incidente via Claude API.

        Best-effort: nunca levanta exceção e é chamada DEPOIS do rollout restart,
        portanto não atrasa a remediação. Usa apenas a stdlib (urllib).
        """
        if not ANTHROPIC_API_KEY:
            log.info("ANTHROPIC_API_KEY não configurado, pulando resumo GenAI.")
            return None

        prompt = (
            "Você é um assistente de SRE da plataforma de doações SolidaryTech. "
            "Com base no alerta abaixo, escreva uma análise de incidente curta e objetiva, "
            "em português do Brasil, com três tópicos: (1) causa provável, (2) impacto para "
            "o doador e (3) próximos passos recomendados. Máximo de 120 palavras. "
            "Não invente métricas que não estejam no alerta.\n\n"
            f"Alerta: {ctx.get('alertname')}\n"
            f"Serviço: {ctx.get('service')}\n"
            f"Severidade: {ctx.get('severity')}\n"
            f"Resumo: {ctx.get('summary')}\n"
            f"Descrição: {ctx.get('description')}\n"
            f"Runbook: {ctx.get('runbook_url')}\n"
        )

        body = {
            "model": ANTHROPIC_MODEL,
            "max_tokens": AISUMMARY_MAX_TOKENS,
            "messages": [{"role": "user", "content": prompt}],
        }

        try:
            req = urllib.request.Request(
                f"{ANTHROPIC_BASE_URL}/v1/messages",
                data=json.dumps(body).encode("utf-8"),
                headers={
                    "Content-Type": "application/json",
                    "x-api-key": ANTHROPIC_API_KEY,
                    "anthropic-version": "2023-06-01",
                },
                method="POST",
            )
            with urllib.request.urlopen(req, timeout=20) as resp:
                data = json.loads(resp.read().decode("utf-8"))

            parts = [b.get("text", "") for b in data.get("content", []) if b.get("type") == "text"]
            summary = "".join(parts).strip()
            if summary:
                log.info("Resumo GenAI gerado com sucesso.")
            return summary or None
        except Exception as e:
            log.error(f"Falha ao gerar resumo GenAI: {e}")
            return None


    def execute_rollout_restart(service_name, namespace):
        """Executa kubectl rollout restart no deployment. Retorna (success, details)."""
        cmd = [
            "kubectl", "rollout", "restart",
            f"deployment/{service_name}",
            "-n", namespace,
        ]
        log.info(f"Executando: {' '.join(cmd)}")
        try:
            result = subprocess.run(cmd, capture_output=True, text=True, timeout=30)
            if result.returncode == 0:
                log.info(f"✅ Rollout restart OK: {result.stdout.strip()}")
                return True, result.stdout.strip()
            log.error(f"❌ Rollout restart FALHOU: {result.stderr.strip()}")
            return False, result.stderr.strip()
        except subprocess.TimeoutExpired:
            log.error("❌ Timeout ao executar rollout restart")
            return False, "Timeout"
        except Exception as e:
            log.error(f"❌ Erro inesperado: {e}")
            return False, str(e)


    def send_discord_notification(ctx, action, success, details, ai_summary):
        """Envia um único embed ao Discord com a remediação e a análise GenAI."""
        if not DISCORD_WEBHOOK_URL:
            log.info("DISCORD_WEBHOOK_URL não configurado, pulando notificação.")
            return

        if success is None:
            emoji, color, status_msg = "🧠", 3447003, "sem remediação automática (ação manual)"
        elif success:
            emoji, color, status_msg = "✅", 3066993, "remediação executada com sucesso"
        else:
            emoji, color, status_msg = "❌", 15158332, "remediação FALHOU"

        fields = [
            {"name": "Serviço", "value": ctx.get("service", "?"), "inline": True},
            {"name": "Severidade", "value": ctx.get("severity", "?"), "inline": True},
            {"name": "Ação", "value": action, "inline": True},
        ]
        if ai_summary:
            fields.append({
                "name": "🧠 Análise de causa raiz (IA)",
                "value": ai_summary[:1024],
                "inline": False,
            })

        payload = {
            "embeds": [{
                "title": f"{emoji} Incidente: {ctx.get('alertname', '?')} — {ctx.get('service', '?')}",
                "description": status_msg,
                "color": color,
                "fields": fields,
                "footer": {"text": f"SolidaryTech AIOps | {details}"[:2048]},
                "timestamp": datetime.utcnow().isoformat() + "Z",
            }]
        }

        try:
            req = urllib.request.Request(
                DISCORD_WEBHOOK_URL,
                data=json.dumps(payload).encode("utf-8"),
                headers={
                    "Content-Type": "application/json",
                    "User-Agent": "SolidaryTech-AIOps/1.0 (Discord Webhook)",
                },
                method="POST",
            )
            urllib.request.urlopen(req, timeout=10)
            log.info("Notificação enviada para o Discord.")
        except Exception as e:
            log.error(f"Falha ao enviar notificação Discord: {e}")


    class AlertHandler(BaseHTTPRequestHandler):
        def do_POST(self):
            content_length = int(self.headers.get('Content-Length', 0))
            body = self.rfile.read(content_length)

            try:
                payload = json.loads(body)
            except json.JSONDecodeError:
                log.error("Payload inválido recebido")
                self.send_response(400)
                self.end_headers()
                self.wfile.write(b'{"error": "invalid JSON"}')
                return

            alerts = payload.get("alerts", [])
            log.info(f"Recebidos {len(alerts)} alertas do Alertmanager")

            results = []
            for alert in alerts:
                status = alert.get("status", "unknown")
                labels = alert.get("labels", {})
                annotations = alert.get("annotations", {})
                service_name = labels.get("service_name", "unknown")
                self_healing = labels.get("self_healing", "false")
                alertname = labels.get("alertname", "unknown")

                log.info(f"Alerta: {alertname} | Serviço: {service_name} | "
                         f"Status: {status} | Self-healing: {self_healing}")

                # Só age em alertas firing (resolved não precisa de ação)
                if status != "firing":
                    log.info(f"Alerta resolved para {service_name}, nenhuma ação necessária.")
                    continue

                ctx = {
                    "alertname": alertname,
                    "service": service_name,
                    "severity": labels.get("severity", "?"),
                    "summary": annotations.get("summary", ""),
                    "description": annotations.get("description", ""),
                    "runbook_url": annotations.get("runbook_url", ""),
                }

                # 1) Remediação automática PRIMEIRO — preserva a latência de ms do
                #    self-healing. Só roda com self_healing=true + serviço conhecido.
                namespace = SERVICE_NAMESPACE_MAP.get(service_name)
                if self_healing == "true" and namespace:
                    log.info(f"🔄 Iniciando self-healing para {service_name} em {namespace}")
                    success, details = execute_rollout_restart(service_name, namespace)
                    action = "kubectl rollout restart"
                else:
                    success, details = None, "remediação manual (ver runbook)"
                    action = "nenhuma (sem self_healing)"
                    if self_healing == "true" and not namespace:
                        log.warning(f"Serviço desconhecido: {service_name}")

                # 2) Análise de causa raiz com GenAI (DEPOIS do restart, não bloqueia)
                ai_summary = generate_incident_summary(ctx)

                # 3) Notificação única no Discord: remediação + análise GenAI
                send_discord_notification(ctx, action, success, details, ai_summary)

                results.append({
                    "service": service_name,
                    "namespace": namespace,
                    "remediated": success,
                    "ai_summary": bool(ai_summary),
                })

            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(json.dumps({"results": results}).encode())

        def do_GET(self):
            """Health check endpoint."""
            self.send_response(200)
            self.send_header("Content-Type", "application/json")
            self.end_headers()
            self.wfile.write(b'{"status": "ok", "service": "self-healing-webhook"}')

        def log_message(self, format, *args):
            log.info(f"{self.client_address[0]} - {format % args}")


    if __name__ == "__main__":
        port = int(os.getenv("PORT", "9095"))
        server = HTTPServer(("0.0.0.0", port), AlertHandler)
        log.info(f"Self-Healing + AIOps webhook server rodando na porta {port}")
        server.serve_forever()

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: self-healing-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: self-healing
    app.kubernetes.io/component: self-healing
    app.kubernetes.io/part-of: solidarytech
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: self-healing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: self-healing
        app.kubernetes.io/component: self-healing
        app.kubernetes.io/part-of: solidarytech
    spec:
      serviceAccountName: self-healing-sa
      containers:
        - name: webhook-server
          # Usa imagem leve com Python + kubectl já instalado
          image: alpine/k8s:1.29.2
          command: ["python3", "/app/server.py"]
          ports:
            - name: http
              containerPort: 9095
          env:
            - name: PORT
              value: "9095"
            - name: DISCORD_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: self-healing-secrets
                  key: DISCORD_WEBHOOK_URL
                  optional: true
            # --- AIOps: resumo de incidentes com GenAI (Claude API) ---
            # ANTHROPIC_API_KEY vem do Secret self-healing-secrets (External
            # Secrets -> solidarytech/monitoring). optional: true mantem o
            # self-healing funcionando mesmo sem a chave (resumo e best-effort).
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: self-healing-secrets
                  key: ANTHROPIC_API_KEY
                  optional: true
            # Modelo configuravel. Haiku = rapido e barato (FinOps).
            - name: ANTHROPIC_MODEL
              value: "claude-haiku-4-5-20251001"
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 9095
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 9095
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: script
          configMap:
            name: self-healing-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: self-healing-webhook
  namespace: monitoring
  labels:
    app.kubernetes.io/name: self-healing
    app.kubernetes.io/part-of: solidarytech
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: self-healing
  ports:
    - name: http
      port: 9095
      targetPort: 9095
