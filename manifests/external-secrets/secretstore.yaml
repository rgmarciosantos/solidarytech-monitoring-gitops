## ──────────────────────────────────────────────
## SecretStore: AWS Secrets Manager (us-east-1)
## Requer um Secret "aws-credentials" no namespace monitoring com:
##   - access-key
##   - secret-access-key
##   - session-token
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: aws-secretsmanager-us-east-1
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/component: observability
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        secretRef:
          accessKeyIDSecretRef:
            name: aws-credentials
            key: access-key
          secretAccessKeySecretRef:
            name: aws-credentials
            key: secret-access-key
          sessionTokenSecretRef:
            name: aws-credentials
            key: session-token
