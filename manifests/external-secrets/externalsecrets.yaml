## =============================================================================
## ExternalSecrets do stack de monitoring
## Todos puxam do segredo AWS Secrets Manager: solidarytech/monitoring
##
## Keys esperadas no secret JSON:
##   - DISCORD_WEBHOOK_URL
##   - PAGERDUTY_SERVICE_KEY
##   - GRAFANA_ADMIN_USER
##   - GRAFANA_ADMIN_PASSWORD
##   - NEW_RELIC_API_KEY
## =============================================================================

## ──────────────────────────────────────────────
## 1) Alertmanager config
## Renderiza o alertmanager.yaml INTEIRO via template, injetando
## o Discord webhook e a PagerDuty service key.
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/component: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: alertmanager-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      type: Opaque
      data:
        alertmanager.yaml: |
          global:
            resolve_timeout: 5m

          route:
            group_by: ['alertname', 'service_name']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 4h
            receiver: 'default'
            routes:
              # Engole ruído do kube-prometheus-stack (Watchdog é sentinela
              # do pipeline; InfoInhibitor é meta-alerta de inibição).
              # Precisa ser a PRIMEIRA rota — ordem importa.
              - matchers:
                  - alertname =~ "Watchdog|InfoInhibitor"
                receiver: 'null'
                continue: false

              - match:
                  severity: critical
                  self_healing: "true"
                receiver: 'critical-with-healing'
                continue: false

              - match:
                  severity: critical
                receiver: 'critical'
                continue: false

              - match:
                  severity: warning
                receiver: 'chatops-only'
                continue: false

          receivers:
            - name: 'null'

            - name: 'default'
              discord_configs:
                - webhook_url: "{{ .DISCORD_WEBHOOK_URL }}"
                  send_resolved: true
                  title: '{{ `{{ .GroupLabels.alertname }}` }}'
                  message: |-
                    {{ `{{ range .Alerts }}` }}
                    **{{ `{{ .Status | toUpper }}` }}** {{ `{{ .Labels.service_name }}` }}
                    {{ `{{ .Annotations.summary }}` }}
                    {{ `{{ .Annotations.description }}` }}
                    {{ `{{ end }}` }}

            - name: 'critical-with-healing'
              pagerduty_configs:
                - service_key: "{{ .PAGERDUTY_SERVICE_KEY }}"
                  description: '{{ `{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}` }}'
                  details:
                    description: '{{ `{{ range .Alerts }}{{ .Annotations.description }}{{ end }}` }}'
                  severity: critical
              discord_configs:
                - webhook_url: "{{ .DISCORD_WEBHOOK_URL }}"
                  send_resolved: true
                  title: '🚨 [CRITICAL + SELF-HEALING] {{ `{{ .GroupLabels.alertname }}` }}'
                  message: |-
                    {{ `{{ range .Alerts }}` }}
                    **Serviço:** {{ `{{ .Labels.service_name }}` }}
                    **Severity:** {{ `{{ .Labels.severity }}` }}
                    **Status:** {{ `{{ .Status | toUpper }}` }}
                    {{ `{{ .Annotations.summary }}` }}
                    {{ `{{ .Annotations.description }}` }}
                    {{ `{{ end }}` }}
              webhook_configs:
                - url: "http://self-healing-webhook.monitoring.svc.cluster.local:9095"
                  send_resolved: false
                  max_alerts: 1

            - name: 'critical'
              pagerduty_configs:
                - service_key: "{{ .PAGERDUTY_SERVICE_KEY }}"
                  description: '{{ `{{ .GroupLabels.alertname }} - {{ .GroupLabels.service_name }}` }}'
                  details:
                    description: '{{ `{{ range .Alerts }}{{ .Annotations.description }}{{ end }}` }}'
                  severity: critical
              discord_configs:
                - webhook_url: "{{ .DISCORD_WEBHOOK_URL }}"
                  send_resolved: true
                  title: '🔴 [CRITICAL] {{ `{{ .GroupLabels.alertname }}` }}'
                  message: |-
                    {{ `{{ range .Alerts }}` }}
                    **Serviço:** {{ `{{ .Labels.service_name }}` }}
                    **Status:** {{ `{{ .Status | toUpper }}` }}
                    {{ `{{ .Annotations.summary }}` }}
                    {{ `{{ .Annotations.description }}` }}
                    {{ `{{ end }}` }}

            - name: 'chatops-only'
              discord_configs:
                - webhook_url: "{{ .DISCORD_WEBHOOK_URL }}"
                  send_resolved: true
                  title: '⚠️ [WARNING] {{ `{{ .GroupLabels.alertname }}` }}'
                  message: |-
                    {{ `{{ range .Alerts }}` }}
                    **Serviço:** {{ `{{ .Labels.service_name }}` }}
                    {{ `{{ .Annotations.summary }}` }}
                    {{ `{{ .Annotations.description }}` }}
                    {{ `{{ end }}` }}
  data:
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        key: solidarytech/monitoring
        property: DISCORD_WEBHOOK_URL
    - secretKey: PAGERDUTY_SERVICE_KEY
      remoteRef:
        key: solidarytech/monitoring
        property: PAGERDUTY_SERVICE_KEY

---
## ──────────────────────────────────────────────
## 2) Self-healing webhook (Discord URL para notificações)
## Substitui o Secret hardcoded que estava no fim do webhook-receiver.yaml.
## O Deployment já referencia Secret "self-healing-secrets" / key DISCORD_WEBHOOK_URL.
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: self-healing-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/component: self-healing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: self-healing-secrets
    creationPolicy: Owner
  data:
    - secretKey: DISCORD_WEBHOOK_URL
      remoteRef:
        key: solidarytech/monitoring
        property: DISCORD_WEBHOOK_URL

---
## ──────────────────────────────────────────────
## 3) Grafana admin credentials
## Consumido pelo kube-prometheus-stack via grafana.admin.existingSecret.
## Keys admin-user e admin-password são o padrão esperado pelo chart.
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/component: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: solidarytech/monitoring
        property: GRAFANA_ADMIN_USER
    - secretKey: admin-password
      remoteRef:
        key: solidarytech/monitoring
        property: GRAFANA_ADMIN_PASSWORD

---
## ──────────────────────────────────────────────
## 4) OpenTelemetry Collector — New Relic API key
## Consumido via extraEnvs do helm chart do otel-collector.
## O collector referencia ${env:NEW_RELIC_API_KEY} no header api-key.
## ──────────────────────────────────────────────
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: otel-collector-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: solidarytech
    app.kubernetes.io/component: observability
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager-us-east-1
    kind: SecretStore
  target:
    name: otel-collector-secrets
    creationPolicy: Owner
  data:
    - secretKey: NEW_RELIC_API_KEY
      remoteRef:
        key: solidarytech/monitoring
        property: NEW_RELIC_API_KEY
